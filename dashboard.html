    :root {
      --bg: #0a0f1e;
      --card: #131929;
      --border: #1e2d4a;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px;
             display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header .badge { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 4px;
                    font-size: 11px; font-weight: 600; }
    .gen-time { margin-left: auto; color: var(--muted); font-size: 12px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* KPI 카드 */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .kpi .value { font-size: 28px; font-weight: 700; }
    .kpi .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .green { color: var(--green); }
    .red   { color: var(--red); }
    .blue  { color: var(--accent); }
    .yellow{ color: var(--yellow); }

    /* 차트 그리드 */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 720px) { .chart-grid { grid-template-columns: 1fr; } }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .chart-card h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
    .chart-card canvas { max-height: 220px; }

    /* 신호 테이블 */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .table-card h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
         color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .verdict-hit     { background: rgba(34,197,94,.15);  color: var(--green); border-radius: 4px; padding: 1px 6px; }
    .verdict-miss    { background: rgba(239,68,68,.15);  color: var(--red);   border-radius: 4px; padding: 1px 6px; }
    .verdict-neutral { background: rgba(100,116,139,.15);color: var(--muted); border-radius: 4px; padding: 1px 6px; }
    .verdict-pending { background: rgba(234,179,8,.12);  color: var(--yellow);border-radius: 4px; padding: 1px 6px; }

    .empty { text-align: center; padding: 40px; color: var(--muted); }
    footer { text-align: center; padding: 24px; color: var(--muted); font-size: 11px; }
  </style>
</head>

      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${item.label}</div>
      <div style="margin-bottom:4px;">${item.icon} <b>${item.main}</b></div>
      <div style="font-size:11px;color:var(--muted);">${item.sub}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px;">${item.time}</div>
    </div>`).join('');

  // Trend chart
  if (STATS.trend && STATS.trend.length > 0) {
    const ctx = document.getElementById('chartTrend').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: STATS.trend.map(r => r.date.slice(5)),
        datasets: [{ label: '신호 건수', data: STATS.trend.map(r => r.count),
          backgroundColor: 'rgba(59,130,246,.6)', borderRadius: 3 }]
      },
      options: { plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
    });
  }

  // Type chart
  if (STATS.by_type && STATS.by_type.length > 0) {
    const ctx2 = document.getElementById('chartType').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: STATS.by_type.map(r => r.type),
        datasets: [
          { label: 'Hit',   data: STATS.by_type.map(r => r.hits), backgroundColor: 'rgba(34,197,94,.7)' },
          { label: 'Total', data: STATS.by_type.map(r => r.count - r.hits), backgroundColor: 'rgba(100,116,139,.4)' },
        ]
      },
      options: { plugins:{legend:{position:'bottom'}}, scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}}
    });
  }

  // Table
  if (!STATS.recent || STATS.recent.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">발굴 신호 없음</div>';
    return;
  }
  const rows = STATS.recent.map(r => {
    const vc = r.verdict === 'hit' ? 'hit' : r.verdict === 'miss' ? 'miss' : r.verdict === 'neutral' ? 'neutral' : 'pending';
    const ret  = r.ret5  != null ? `<span class="${clr(r.ret5)}">${r.ret5>0?'+':''}${r.ret5}%</span>` : '—';
    const alpha= r.alpha5!= null ? `<span class="${clr(r.alpha5)}">${r.alpha5>0?'+':''}${r.alpha5}%</span>` : '—';
    return `<tr>
      <td>${r.date}</td>
      <td><b>${r.ticker}</b></td>
      <td><small>${r.type||'기타'}</small></td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.headline||''}</td>
      <td>${r.rubric!=null?r.rubric+'/10':'—'}</td>
      <td>${ret}</td>
      <td>${alpha}</td>
      <td><span class="verdict-${vc}">${r.verdict}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>날짜</th><th>종목</th><th>유형</th><th>헤드라인</th>
        <th>루브릭</th><th>T+5</th><th>Alpha</th><th>판정</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
})();
</script>
</body>
</html>
