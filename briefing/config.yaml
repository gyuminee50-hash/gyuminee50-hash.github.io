universe:
  exclude_holdings: [TSM, MU, GGLL, IEMG, SPY, QQQ]
  holdings_watch:   [TSM, MU, GGLL, IEMG, SPY, QQQ]

discovery:
  absolute_threshold: 7    # 루브릭 총점 이 이상이면 전부 발송 (개수 상한 없음)
  novelty_days: 14         # 최근 14일 발송 종목 재탕 금지
  directions: [상승선행, 급락이상]

rubric:
  threshold: 7
  kill_if_backward_looking: true   # 미래성 0점이면 총점 무관 즉시 탈락
  threshold_overrides:
    공급망변화: 8

scanner:
  volume_multiple: 2.0
  price_move_pct: 3.0
  require_leading_signal: true

outcome:
  horizon_days: 5
  hit_return_pct: 3.0
  miss_return_pct: 0.0
  benchmark_us: SPY
  benchmark_kr: "^KS11"

insight:
  domains: [발굴시스템, 코드아키텍처, 투자전략, 매크로리스크, 워크플로운영]
  min_score: 7
  daily_cap: null
  review_on_commit: true

models:
  scout: llama-3.1-8b-instant
  judge: llama-3.3-70b-versatile
  daily_token_budget_70b: 90000
